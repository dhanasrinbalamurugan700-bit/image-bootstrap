<!DOCTYPE html>
<html lang="en">
<head>
  <title>Colorful Images</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 4 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg, #ff9a9e, #fad0c4); font-family:'Poppins', sans-serif;">

<div class="container text-center mt-5">
  <h2 class="mb-4 text-white">Colorful Image Styles </h2>
</div>

<!-- Rounded -->
<div class="container mt-4 text-center">
  <h4 class="mb-3 text-dark">Rounded</h4>
  <img src="https://picsum.photos/304/236?random=1" class="rounded img-fluid shadow-lg">
</div>

<!-- Circle -->
<div class="container mt-5 text-center">
  <h4 class="mb-3 text-dark">Circle</h4>
  <img src="https://picsum.photos/300/300?random=2" class="rounded-circle img-fluid shadow-lg">
</div>

<!-- Thumbnail -->
<div class="container mt-5 text-center">
  <h4 class="mb-3 text-dark">Thumbnail</h4>
  <img src="https://picsum.photos/304/236?random=3" class="img-thumbnail shadow-lg">
</div>

<!-- Align -->
<div class="container mt-5 text-center">
  <h4 class="mb-3 text-dark">Align</h4>
  <div class="clearfix">
    <img src="https://picsum.photos/304/236?random=4" class="float-left rounded shadow-lg">
    <img src="https://picsum.photos/305/236?random=5" class="float-right rounded shadow-lg">
  </div>
</div>

<!-- Center -->
<div class="container mt-5 text-center">
  <h4 class="mb-3 text-dark">Center</h4>
  <img src="https://picsum.photos/300/200?random=6" class="mx-auto d-block rounded shadow-lg" style="width:40%">
</div>

<!-- Responsive -->
<div class="container mt-5 text-center mb-5">
  <h4 class="mb-3 text-dark">Responsive</h4>
  <img src="https://picsum.photos/460/300?random=7" class="img-fluid rounded shadow-lg">
</div>

</body>
</html>
